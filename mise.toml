# Tool versions for this project, managed by mise (https://mise.jdx.dev).
#   mise install        # fetch the pinned tools (needs only mise on a fresh clone)
#   mise exec -- clang-format --version
#
# clang-format / clang-tidy come from prebuilt PyPI wheels (LLVM binaries; the clang-format
# wheel is the same artifact pre-commit's mirror wraps). mise installs them via its pipx
# backend, which uses `uv`. uv is pinned here too so a fresh clone needs nothing but mise
# itself (mise fetches uv as a static binary, then uv installs the wheels — no system
# pipx/python/conda).
#
# Keep clang-format's version in sync with the clang-format rev in .pre-commit-config.yaml.
# clang-tidy is local/advisory only (`make tidy`); the tidy wheel ships fewer patch releases,
# so 20.1.0 is the nearest to clang-format 20.1.8 — the exact patch need not match (they're
# independent tools).
#
# platformio ships the `pio` build CLI; left unpinned (CI provisions it from this file via
# jdx/mise-action, so local and CI track together). PlatformIO pins its own
# toolchains/platforms in platformio.ini, so the Core version here isn't the reproducibility
# lever the clang pins are.
#
# protoc is PINNED: tools/schema_hash_extra_script.py hashes the shared .proto's compiled
# FileDescriptorSet into both firmwares (design.md §9 schema gate), and descriptor bytes are
# only guaranteed byte-stable for a fixed protoc release. Bumping it may change the hash,
# which is safe but means reflashing both boards together (they're always a matched pair).
#
# platformio carries `--with protobuf/grpcio-tools`: nanopb's PlatformIO codegen
# (native_control + firmware envs) imports google.protobuf and grpc_tools at build time. It
# would otherwise try to `pip install` them into pio's interpreter at first build, which fails
# because mise builds the tool venv with uv (no `pip` inside). `--with` bakes them into that
# same venv so codegen just works — locally and in CI (both provision from this file).
# node provides `npx`, used only to regenerate the LVGL UI font via `npx lv_font_conv`
# (see lib/ui_logic/fonts/README.md). Not needed for a normal build — the generated font .c is
# committed — so it's left unpinned/latest; nothing here depends on a specific node version.
[tools]
uv = "latest"
node = "latest"
"pipx:clang-format" = "20.1.8"
"pipx:clang-tidy" = "20.1.0"
"pipx:platformio" = { version = "latest", uvx_args = "--with protobuf>=3.19.1 --with grpcio-tools>=1.43.0" }
protoc = "35.1"
