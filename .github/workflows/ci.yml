name: CI

# Runs the host test suites and a firmware compile-check on every push / PR.
# On-target tests (pio test -e embedded) need the physical board, so they're not run here —
# run them locally, or wire up a self-hosted runner / `pio remote` later.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Formatting + whitespace/YAML/Markdown hygiene. The hooks are self-contained
  # (clang-format ships its own binary), so this job needs no PlatformIO or mise.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true # lib/tinyframe/TinyFrame

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true # lib/tinyframe/TinyFrame

      # Cache PlatformIO's core + tool/library downloads (platforms, LVGL, ArduinoFake, ...).
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      # Same toolchain provisioning as a dev clone: mise installs pio + the pinned protoc
      # (tools/schema_hash_extra_script.py needs protoc; the pin keeps the schema hash
      # reproducible). mise-action caches the tool installs itself.
      # clang is pinned in mise.toml only for the local `make fuzz` workflow (a couple GB of LLVM);
      # CI never fuzzes, so skip that download here.
      - name: Install toolchain (mise)
        uses: jdx/mise-action@v2
        env:
          MISE_DISABLE_TOOLS: clang

      # Fast host tests: pure logic behind the ports + LVGL headless UI. `native` uses the
      # runner's system GCC (no toolchain download needed).
      - name: Native tests
        run: pio test -e native_logic_cyd -e native_ui_cyd -e native_ui_cyd_35 -e native_control

      # CI can't flash a board, but building both firmwares catches compile/link regressions.
      # The embedded suite is built (not run) for the same reason: nothing else compiles it, and
      # that is precisely how it silently stopped building.
      - name: Firmware compile-check
        run: |
          pio run -e esp32dev_cyd35 -e esp32dev_cyd -e esp32dev_control
          pio test -e embedded --without-testing --without-uploading

      # Headless UI-simulator smoke: build the sim, render the real UI plus one click,
      # keep the PNG as an inspectable artifact. Pure memory render — no display server.
      - name: UI simulator smoke screenshot
        run: |
          pio run -e native_sim
          mkdir -p sim-artifacts
          .pio/build/native_sim/program --out sim-artifacts/ui.png click 160 120 wait 300

      - name: Upload UI screenshot
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshot
          path: sim-artifacts/ui.png
