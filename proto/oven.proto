// Shared CYD<->controller message schema, v1 (design.md §9; fault codes §22).
//
// This file is the single wire contract: nanopb compiles it into both firmwares
// (custom_nanopb_protos in platformio.ini), and tools/schema_hash_extra_script.py
// bakes a hash of its compiled FileDescriptorSet into both binaries. The hash is
// exchanged in Hello.schema_hash at boot and any mismatch fails closed, so fields
// here may churn freely as long as both boards are reflashed together.
//
// Repeated-field capacities (nanopb static allocation) live in oven.options.
syntax = "proto3";

package oven;

// ============================================================================
// Hello — FROZEN, APPEND-ONLY bootstrap contract (design.md §9).
//
// Hello (both directions) and its TinyFrame type id (kTfTypeHello in
// lib/protocol/messages.h) must stay decodable across ANY version skew — it is
// what carries the schema hash that gates everything else. Never renumber or
// retype existing fields; only append new ones.
//
// CYD -> controller: fills proto_ver + schema_hash.
// controller -> CYD: fills proto_ver, schema_hash, fw_ver, caps.
// ============================================================================
message Hello {
  uint32 proto_ver = 1;
  fixed64 schema_hash = 2; // FileDescriptorSet hash; mismatch => fail closed
  uint32 fw_ver = 3; // controller->CYD only
  uint32 caps = 4; // controller->CYD only: capability bitmask
  // Random, re-rolled every boot. A Hello carrying a nonce different from the one we
  // last saw means the peer restarted and knows nothing about us, so we answer with
  // our own Hello -- without that, a peer rebooting after the handshake would Hello
  // into silence forever (we stop announcing once we have seen it) and could never
  // re-match, defeating §9's decided re-sync. An unchanged nonce (a retransmit, or a
  // stray duplicate frame) is ignored, which is what stops two live boards trading
  // Hellos back and forth forever.
  uint32 boot_nonce = 5;
}

// Declared run mode. The controller cross-checks it against recipe content and
// NAKs a mismatch (mode is a declaration, not a privilege escalation).
enum Mode {
  MODE_UNSPECIFIED = 0;
  MODE_CURE = 1;
  MODE_REFLOW = 2;
}

// How a segment approaches its target temperature (design.md §5).
enum Interp {
  INTERP_UNSPECIFIED = 0;
  INTERP_RAMP_OVER_TIME = 1; // linear setpoint sweep across dur_ms
  INTERP_RAMP_ASAP = 2; // full power toward heat_c; dur_ms is the stall watchdog
  INTERP_HOLD = 3; // hold heat_c for dur_ms
}

enum RunState {
  RUN_STATE_IDLE = 0;
  RUN_STATE_RUNNING = 1;
  RUN_STATE_DONE = 2;
  RUN_STATE_FAULT = 3;
}

// Owned by the controller (design.md §22). The CYD maps codes to operator
// guidance and must show a generic message for codes it doesn't know yet.
enum FaultCode {
  FAULT_NONE = 0;
  FAULT_OVERTEMP_CHAMBER = 1;
  FAULT_OVERTEMP_CASE = 2;
  FAULT_SENSOR_FAULT = 3;
  FAULT_TC_IMPLAUSIBLE = 4;
  FAULT_TARGET_UNREACHABLE = 5;
  FAULT_HEATER_STUCK = 6;
  FAULT_RUNTIME_EXCEEDED = 7;
  FAULT_LINK_LOST = 8;
  FAULT_WATCHDOG = 9;
  FAULT_INTERNAL = 10;
}

enum NakReason {
  NAK_UNSPECIFIED = 0;
  NAK_OUT_OF_RANGE = 1;
  NAK_ILLEGAL_TRANSITION = 2;
  NAK_MODE_CONTENT_MISMATCH = 3;
  NAK_WORKPIECE_TC_INVALID = 4;
  NAK_UNKNOWN_RECIPE = 5;
  // Profile/settings management verdicts (design.md §9 "Profile & settings management").
  NAK_STOCK_READONLY = 6; // save-over / delete / rename of a stock profile (§23)
  NAK_NAME_INVALID = 7;   // bad name: empty, too long, path chars, or a clash on write
  NAK_NOT_FOUND = 8;      // no such profile in that mode's store
  NAK_STORE_FULL = 9;     // the mode library is at capacity
}

// Per-phase convection-fan intent a *stored* profile carries (design.md §5). Mirrors the
// CYD's FanMode. Only the compiled Recipe carries a resolved on/off (Segment.conv_fan is a
// bare bool); the stored profile keeps the AUTO intent so it re-resolves if calibration
// changes. Values match lib/app_logic/phase.h FanMode {Auto=0, On=1, Off=2}.
enum FanMode {
  FAN_MODE_AUTO = 0;
  FAN_MODE_ON = 1;
  FAN_MODE_OFF = 2;
}

// Temperature display unit for the settings blob (design.md §24). Matches
// lib/app_logic/settings_store.h TempUnits {Celsius=0, Fahrenheit=1}.
enum TempUnits {
  TEMP_UNITS_CELSIUS = 0;
  TEMP_UNITS_FAHRENHEIT = 1;
}

// One executable step. Fans are resolved on/off — the CYD applies any "Auto"
// policy before upload; no Auto value crosses the wire (design.md §5).
message Segment {
  reserved 4;             // was cool_fan — the chamber has no cooling fan (§6); cooling is passive
  reserved "cool_fan";
  uint32 dur_ms = 1;
  float heat_c = 2;
  bool conv_fan = 3;
  bool uv = 5;
  bool motor = 6;
  Interp interp = 7;
}

// Setup path (seq + Ack/Nak, retried until acknowledged). seq is the correlation
// key the controller echoes in Ack/Nak and dedups on (design.md §9).
message Recipe {
  uint32 id = 1;
  Mode mode = 2;
  repeated Segment segments = 3;
  uint32 seq = 4;
}

// Setup path (seq + Ack/Nak, retried until acknowledged). seq correlates the
// controller's Ack/Nak back to this command and is the dedup key on resend.
message Start {
  uint32 session = 1;
  uint32 recipe_id = 2;
  uint32 seq = 3;
}

// Hot path, CYD -> controller every 200 ms. enable=false or staleness beyond
// the 750 ms command-timeout stops everything (design.md §9).
message Heartbeat {
  uint32 session = 1;
  uint32 seq = 2;
  bool enable = 3;
  uint32 millis = 4;
}

// Fire-and-forget immediate safe; also implied by stopping the heartbeat.
message Abort {}

message Ack {
  uint32 seq = 1;
}

message Nak {
  uint32 seq = 1;
  NakReason reason = 2;
}

// Hot path, controller -> CYD at 4 Hz during a run (~1 Hz idle). Carries the
// full raw state vector — this record doubles as the SD log format (§7).
message Telemetry {
  reserved 13;         // was cool_fan — the chamber has no cooling fan (§6); cooling is passive
  reserved "cool_fan";
  uint32 session = 1;
  uint32 seq = 2;
  uint32 ctrl_millis = 3;
  repeated float wall_temp = 4; // chamber-wall TC array, deg C
  float work_temp = 5; // workpiece TC, deg C
  float board_est = 6; // estimated board temp, deg C
  float case_temp = 7; // electronics-case sensor, deg C
  float humidity = 8; // %RH
  bool door_open = 9;
  float setpoint = 10; // active target, deg C
  float heater_duty = 11; // 0..1 commanded duty
  bool conv_fan = 12;
  float uv_duty = 14; // 0..1
  bool motor = 15;
  uint32 seg_idx = 16;
  uint32 elapsed_ms = 17; // into the current run
  RunState run_state = 18;
  FaultCode fault_code = 19;
}

message Done {
  uint32 session = 1;
}

message Fault {
  uint32 session = 1;
  FaultCode code = 2;
}

// ============================================================================
// Profile & settings management (design.md §9 "Profile & settings management").
//
// ADDED with the 2026-07-17 "CYD is a UI remote" split (§2): the profile library +
// device settings now persist on the CONTROLLER, and the CYD browses/edits them as a
// remote client. These ride the request/reply path — seq-correlated, single-outstanding,
// retried until the reply lands, deduped so a resend never double-applies. All behind the
// schema-hash gate (only Hello is frozen). frame-type ids in lib/protocol/messages.h.
//
// The profile domain model (Phase/Profile) is now a WIRE type — the same schema a future
// PC authoring tool would target. Repeated/string caps live in oven.options.
// ============================================================================

// One authored phase (the editor's ramp-x/hold-y domain form, §5/§12). Mirrors
// lib/app_logic/phase.h Phase. Compiles to Segment[] at run-start (that path is
// unchanged); this type is for STORAGE + editing, so it keeps the pre-compile fields
// (fan intent, exposure) a Segment doesn't carry.
message Phase {
  string name = 1;                // operator-visible, <= kPhaseNameCap
  float target_c = 2;             // phase setpoint, deg C
  float ramp_s = 3;               // approach time; 0 => RAMP_ASAP
  float hold_s = 4;               // reflow: raw soak seconds
  float exposure_per_surface = 5; // cure: UV dose (compiler derives hold_s), else ignored
  bool uv = 6;                    // UV lamp on (cure)
  bool motor = 7;                 // turntable on (cure)
  FanMode fan_mode = 8;           // convection-fan intent (AUTO resolved at compile time)
}

// One stored profile: a named, mode-scoped Phase[] with the stock/user flag (§23).
message Profile {
  Mode mode = 1;
  string name = 2; // <= kProfileNameCap; the store's filesystem key
  bool stock = 3;  // read-only factory reference (§23)
  repeated Phase phases = 4;
  // Recency rank for the CYD's most-recently-used sort (§23). CONTROLLER-authoritative: the
  // store stamps it (a monotonic max-existing+1) on save and on ProfileTouch; a wire value the
  // CYD sets is ignored. There is no persistent RTC on the controller (millis() resets each
  // boot), so recency is this sequence counter, not a wall-clock time.
  uint32 use_seq = 5;
}

// A lightweight list row (design.md §23): enough to render the library without loading
// every Phase[]. peak_c / total_s are the derived facts ("peak 245° · ~6:10"). Rows arrive already
// ordered per the request's ProfileSort — the controller owns the ordering (it holds use_seq and
// has the DRAM to sort), so the CYD renders the list as received and never carries a recency key.
message ProfileSummary {
  string name = 1;
  bool stock = 2;
  float peak_c = 3;  // hottest phase target
  uint32 total_s = 4; // estimated total run seconds (incl. cool-down)
}

// The device-settings blob (design.md §24). Mirrors lib/app_logic/settings_store.h Settings.
message Settings {
  TempUnits units = 1;
  bool auto_brightness = 2;
  bool advanced_unlocked = 3;
  int32 brightness_bias = 4;
  int32 screen_brightness_pct = 5;
  int32 idle_timeout_min = 6;
  int32 uv_max_cap = 7;
  int32 reflow_max_cap = 8;
}

// How the controller orders a ProfileList reply (design.md §23). ALPHA is the manage-library base;
// MRU (most-recently-used, newest first) is the Setup → Load picker's default. The controller sorts
// because it owns the recency counter (Profile.use_seq) and has the DRAM the CYD lacks (§2/§6a).
enum ProfileSort {
  PROFILE_SORT_ALPHA = 0;
  PROFILE_SORT_MRU = 1;
}

// --- Requests (CYD -> controller). Each carries seq for correlation + dedup. ---

// PAGED since 2026-07-22 (design.md §23). One reply carries a *window* of the mode's library,
// not the whole thing, so the frame size stops scaling with the library and the per-mode cap
// became a storage question rather than a DRAM one. The controller still sorts the FULL set to
// page it correctly — it owns use_seq and has the DRAM (§2/§6a); only the reply is windowed.
message ProfileListReq {
  uint32 seq = 1;
  Mode mode = 2;
  ProfileSort sort = 3;
  uint32 offset = 4; // index of the first row wanted, in `sort` order; clamped by the controller
  uint32 limit = 5;  // max rows to return; 0 => the controller's window size
  // If set and present in this mode's library, the controller returns the page CONTAINING this
  // name and ignores `offset`. This is how the CYD keeps a row in view across a mutation without
  // ever computing a page number itself: after a delete it anchors on the neighbour row, after a
  // save/dup/rename on the new name, after a run-start ProfileTouch (which reorders MRU) on the
  // profile it ran. An anchor that no longer exists falls back to `offset`.
  string anchor_name = 6;
}
message ProfileGetReq {
  uint32 seq = 1;
  Mode mode = 2;
  string name = 3;
}
message ProfilePut {
  uint32 seq = 1;
  Profile profile = 2;
}
message ProfileDelete {
  uint32 seq = 1;
  Mode mode = 2;
  string name = 3;
}
message ProfileDup {
  uint32 seq = 1;
  Mode mode = 2;
  string src = 3;
  string dst = 4; // the CYD pre-deconflicts dst against its cached list (§23)
}
message ProfileRename {
  uint32 seq = 1;
  Mode mode = 2;
  string old_name = 3;
  string new_name = 4;
}
// Mark a profile "used" so it floats to the top of the CYD's most-recently-used order (§23).
// Sent at run-start; the controller bumps the profile's stamped recency counter. Rides the
// request/reply path like the other mutations (seq-correlated, deduped) — but a lost touch is
// merely cosmetic (the profile just doesn't rise), so the CYD fires it and ignores the verdict.
message ProfileTouch {
  uint32 seq = 1;
  Mode mode = 2;
  string name = 3;
}
// Reinstall one mode's stock profiles from the CONTROLLER's own compiled-in table
// (design.md §23 "Restore stock profiles", surfaced in Settings §24).
//
// Note what this message does NOT carry: any profile content. The CYD asks for a restore; the
// controller decides what a stock profile is, from firmware it was built with. That asymmetry is
// the whole safety argument — a peer can trigger the privileged write that ProfileStore::save()
// and remove() refuse (§23 read-only), but can never choose what it writes, so it cannot use the
// restore path to plant an unremovable profile. User profiles are left untouched, including one
// that happens to hold a stock name.
message ProfileRestoreStock {
  uint32 seq = 1;
  Mode mode = 2;
}
message SettingsGetReq {
  uint32 seq = 1;
}
message SettingsPut {
  uint32 seq = 1;
  Settings settings = 2;
}

// --- Replies (controller -> CYD). seq echoes the request. ---

// One window of the mode's library (see ProfileListReq). `offset`/`total` are what let the CYD
// page without arithmetic of its own: it renders `profiles` at `offset`, knows it is done when
// `offset + count >= total`, and sizes its scroll position from `total`.
message ProfileList {
  uint32 seq = 1;
  repeated ProfileSummary profiles = 2;
  // The offset the controller ACTUALLY used — the request's, clamped into range, or the one it
  // resolved from anchor_name. The CYD trusts this over what it asked for, which is what makes a
  // delete that empties the last page self-correcting rather than a phantom-row bug.
  uint32 offset = 3;
  uint32 total = 4; // profiles in this mode's library (not in this reply)
}
message ProfileData {
  uint32 seq = 1;
  Profile profile = 2;
}
message SettingsData {
  uint32 seq = 1;
  Settings settings = 2;
}
// The management verdict — reply to Put/Delete/Dup/Rename/SettingsPut, and the negative
// reply to a Get/List (e.g. reason=NAK_NOT_FOUND). Kept distinct from setup-path Ack/Nak
// so management traffic has its own seq space and can never perturb the authorization path.
message MgmtResult {
  uint32 seq = 1;
  bool ok = 2;
  NakReason reason = 3; // meaningful only when ok=false
}
