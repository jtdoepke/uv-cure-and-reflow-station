; PlatformIO Project Configuration File
;
; Board: ESP32-2432S028 "Cheap Yellow Display", dual-USB v3 variant (ST7789 panel,
; XPT2046 touch). Driven by LovyanGFX + LVGL 9. LovyanGFX has its own SPI panel driver
; and all display/touch/pin config lives in include/LGFX_CYD2USB.hpp, so this builds
; against the latest arduino-esp32 / ESP-IDF with no version pins and no board submodule.
; A generic esp32dev board is sufficient (WROOM-32, 4 MB flash, no PSRAM).
;
; Docs: https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
	-Ofast
	; Point LVGL at our project-local config (include/lv_conf.h). The '"..."' nesting is
	; required so the value reaches the compiler as a quoted string literal (#include).
	-D LV_CONF_PATH='"${platformio.include_dir}/lv_conf.h"'
lib_deps =
	lovyan03/LovyanGFX@^1.2.0
	lvgl/lvgl@^9.5.0
