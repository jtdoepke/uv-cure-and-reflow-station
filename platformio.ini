; PlatformIO Project Configuration File
;
; Boards: two CYD "Cheap Yellow Display" variants, selected by a [board_*] section below.
;   esp32dev_cyd35  ESP32-3248S035  3.5" ST7796S 320x480 portrait  (DEFAULT)
;   esp32dev_cyd    ESP32-2432S028  2.8" ST7789  240x320 landscape (dual-USB v3)
; Both are ESP32-WROOM-32 (4 MB flash, no PSRAM) + XPT2046 touch, driven by LovyanGFX + LVGL 9.
; LovyanGFX has its own SPI panel driver and all display/touch/pin config lives in
; include/LGFX_CYD*.hpp, so this builds against the latest arduino-esp32 / ESP-IDF with no version
; pins and no board submodule. A generic esp32dev board is sufficient for both.
;
; Docs: https://docs.platformio.org/page/projectconf.html
;
; Test envs (three-tier pyramid, see CLAUDE.md "Testing"):
;   pio test -e native_logic_cyd  fast host tests of pure logic behind IDisplay/ITouch ports
;   pio test -e native_ui_cyd     host LVGL UI tests via LVGL's headless dummy display
;   pio test -e native_control    fast host tests of controller logic behind its ports
;   pio test -e embedded_cyd35    on-board LovyanGFX/touch/heap checks (needs the 3.5" board)
;   pio test -e embedded          the same, on the 2.8" board
; `pio run` (no -e) builds only the esp32dev_cyd35 firmware, per default_envs below.
;
; Naming: the CYD (HMI) and the oven-controller MCU are separate targets; CYD-specific
; dirs/envs carry a `_cyd` postfix, controller ones `_control`.

[platformio]
; The 3.5" board is the default: it is the one that survives WiFi bring-up (§21), and OTA is the
; controller's only field-reflash path once the oven is enclosed (§25), so the 2.8"'s brownout is
; not a cosmetic fault — it is a board with no field-update story. The 2.8" stays fully supported
; (esp32dev_cyd) and both are built by `make build` + CI, so neither can rot.
default_envs = esp32dev_cyd35
src_dir = src_cyd

; ---------- Board variants ----------
; A CYD variant is two decisions that must agree: which board (pins + panel driver) and what
; geometry the UI lays out for. They get separate flag families on purpose:
;
;   CYD_BOARD_*  the pin map + panel driver. Read only by include/cyd_board.h — nothing under
;                lib/ may ever branch on a board identity.
;   PANEL_*      the geometry, read by lib/panel/panel.h — and therefore by lib/ui_logic, sim/
;                and the native test envs, none of which have a board at all. Neutral names
;                because geometry is a property of the panel, not of the board carrying it.
;
; One [board_*] section carries both, so no env can pick a mismatched pair; cyd_board.h
; static_asserts the pairing anyway. The host envs take the section whole and simply never read
; the CYD_BOARD_* half — one source of truth beats two that can drift.
;
; PANEL_ROTATION picks the orientation (0..3, LovyanGFX setRotation semantics: 0 = the panel's
; native portrait, odd = 90 deg = W/H swapped). A flag rather than a header edit, so a unit
; mounted sideways is a build config and not a patch. Touch follows for free: LovyanGFX composes
; setRotation() with each device's FIXED offset_rotation calibration (Panel_LCD.cpp setRotation /
; Panel_Device.cpp convertRawXY), so there is no per-rotation touch math to keep in sync.
;
; Never `extends` between board envs. extends copies keys, so the natural-looking
; `${env:esp32dev_cyd.build_flags} ${board_3248s035.build_flags}` would define BOTH CYD_BOARD_*
; flags and cyd_board.h's #if would silently pick whichever came first — a clean build with the
; wrong pin map. Compose [cyd_common] + exactly one [board_*] instead.

; 2.8" ESP32-2432S028 v3 — ST7789, 240x320 native, run LANDSCAPE.
[board_2432s028]
build_flags =
	-D CYD_BOARD_2432S028=1
	-D PANEL_NATIVE_W=240
	-D PANEL_NATIVE_H=320
	-D PANEL_ROTATION=1           ; landscape 320x240
	; 400 px diagonal / 71.12 mm. 5.60 rather than the nominal 5.624 because it is the figure
	; theme.h's original px literals were hand-derived from — theme.h static_asserts the
	; round-trip, so this value is load-bearing, not documentation.
	-D PANEL_PX_PER_MM_X100=560

; 3.5" ESP32-3248S035 — ST7796S, 320x480 native, run PORTRAIT.
[board_3248s035]
build_flags =
	-D CYD_BOARD_3248S035=1
	-D PANEL_NATIVE_W=320
	-D PANEL_NATIVE_H=480
	-D PANEL_ROTATION=0           ; portrait 320x480 (native)
	; 576.89 px diagonal / 88.9 mm nominal. TODO(HW): measure the active area with calipers — a
	; 0.153 mm pitch would make this 654 (~1%, moves STEPPER_BTN 111->112).
	-D PANEL_PX_PER_MM_X100=649
	; This pitch also picks the fonts — a denser panel needs bigger GLYPHS to hold the same physical
	; text size the mm-authored theme tokens hold for everything else (14 px is 2.16 mm here vs
	; 2.50 mm on the 2.8"; 16 px is 2.47 mm, i.e. parity). Both lv_conf.h (LV_FONT_DEFAULT) and
	; theme.h (the big readout) read PANEL_PX_PER_MM_X100 directly, so there is no font flag to keep
	; in sync with this one — see fonts/README.md.

; Flags common to every CYD build, in one place so a board env can take them WITHOUT also
; inheriting another board's [board_*] section. Same shape as [control_common], same reason.
[cyd_common]
build_flags =
	-Ofast
	; Point LVGL at our project-local config (include/lv_conf.h). The '"..."' nesting is
	; required so the value reaches the compiler as a quoted string literal (#include).
	-D LV_CONF_PATH='"${platformio.include_dir}/lv_conf.h"'

[env:esp32dev_cyd]
platform = espressif32
board = esp32dev
framework = arduino
; The default 4 MB table caps the app at 1.31 MB (two OTA slots) and the firmware has
; outgrown it. No OTA yet (design.md §21/D9 will need its own partition plan anyway),
; so use the stock arduino-esp32 huge_app table: one 3 MB app slot + 1 MB FS.
board_build.partitions = huge_app.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
	${cyd_common.build_flags}
	${board_2432s028.build_flags}
lib_deps =
	lovyan03/LovyanGFX@^1.2.0
	lvgl/lvgl@^9.5.0
	nanopb/Nanopb@^0.4.91
; Shared wire contract (design.md §9): nanopb codegen runs as part of the build, and the
; pre-script bakes the .proto's schema hash into schema_hash.h (Hello handshake gate).
custom_nanopb_protos = +<proto/oven.proto>
extra_scripts = pre:tools/schema_hash_extra_script.py

; ---------- Firmware + UI dev tools (WiFi screenshot/touch API; not for production) ----------
; Adds src_cyd/ui_dev_tools.cpp (guarded by UI_DEV_TOOLS): GET /screenshot.bmp (ST7789 GRAM
; readback), GET /api/touch/simulate, GET /api/info, serial STATUS. Needs WiFi creds in
; the gitignored include/secrets.h. Flash with `make dev-flash`; see the ui-development
; skill.
[env:esp32dev_cyd_uidev]
extends = env:esp32dev_cyd
build_flags =
	${env:esp32dev_cyd.build_flags}
	-D UI_DEV_TOOLS=1
; extends REPLACES extra_scripts rather than merging, so re-include the parent's.
extra_scripts =
	${env:esp32dev_cyd.extra_scripts}
	tools/uidev_extra_script.py

; ---------- CYD bench stimulus (backlog A8; design.md §8 step 1) ----------
; The link plumbing itself is unconditional in esp32dev_cyd — it is production wiring, and a
; sender at session=0/enable=false authorizes nothing. This env adds only the boot-time
; Recipe+Start+HEAT_EN that drives the controller to authorized() so the §8 step-1 fail-safe cut
; is observable on the dummy-load LEDs. §19/C6's Setup/Confirm owns starting a run in
; production. Deliberately NOT folded into esp32dev_cyd_uidev: that one needs WiFi creds in a
; gitignored secrets.h and already sits near the draw-buffer malloc cliff, and the safety proof
; should not depend on either.
[env:esp32dev_cyd_bench]
extends = env:esp32dev_cyd
build_flags =
	${env:esp32dev_cyd.build_flags}
	-D CYD_BENCH_LINK=1
; extends REPLACES extra_scripts rather than merging, so re-include the parent's.
extra_scripts = ${env:esp32dev_cyd.extra_scripts}

; ---------- 3.5" CYD firmware (ESP32-3248S035; ST7796S, portrait) ----------
; Composes [cyd_common] + [board_3248s035] rather than extending esp32dev_cyd — extending would
; drag in that env's [board_2432s028] and define two boards at once (see the [board_*] header).
[env:esp32dev_cyd35]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = huge_app.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
	${cyd_common.build_flags}
	${board_3248s035.build_flags}
lib_deps =
	lovyan03/LovyanGFX@^1.2.0
	lvgl/lvgl@^9.5.0
	nanopb/Nanopb@^0.4.91
custom_nanopb_protos = +<proto/oven.proto>
extra_scripts = pre:tools/schema_hash_extra_script.py

; The 3.5" twins of the two esp32dev_cyd children. Both extend *within* one board family, so
; ${env:esp32dev_cyd35.build_flags} is safe here — it is crossing families that composes two
; [board_*] sections. Both must re-declare extra_scripts: extends replaces rather than merges,
; and losing the schema-hash pre-script is the quiet failure (schema_hash.h goes stale rather
; than missing, and the two boards fail the handshake closed with no obvious cause).
[env:esp32dev_cyd35_uidev]
extends = env:esp32dev_cyd35
build_flags =
	${env:esp32dev_cyd35.build_flags}
	-D UI_DEV_TOOLS=1
extra_scripts =
	${env:esp32dev_cyd35.extra_scripts}
	tools/uidev_extra_script.py

[env:esp32dev_cyd35_bench]
extends = env:esp32dev_cyd35
build_flags =
	${env:esp32dev_cyd35.build_flags}
	-D CYD_BENCH_LINK=1
extra_scripts = ${env:esp32dev_cyd35.extra_scripts}

; ---------- Touch calibration rig (tools/touch_calibrate) ----------
; Flash to a board, tap the 15 targets, paste the printed CALIB values into that board's LGFX
; header. Its own env rather than a test suite because it is inherently interactive and its
; output is source code, not a pass/fail. Compiled by `make build` so it cannot rot.
[env:touch_calib_cyd35]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../tools/touch_calibrate/>
build_flags =
	${cyd_common.build_flags}
	${board_3248s035.build_flags}
lib_deps = lovyan03/LovyanGFX@^1.2.0

[env:touch_calib_cyd]
extends = env:touch_calib_cyd35
build_flags =
	${cyd_common.build_flags}
	${board_2432s028.build_flags}

; On-target suite against the 3.5" board (the `embedded` env's twin; see it for why this builds
; in CI). Needs the board on USB to run, not to build.
[env:embedded_cyd35]
extends = env:embedded
build_flags =
	-D LV_CONF_PATH='"${platformio.include_dir}/lv_conf.h"'
	${board_3248s035.build_flags}

; ---------- Oven-controller firmware (2nd MCU; design.md §2, §11) ----------
; ESP32-WROOM-32E dev board now, the same module on the future custom PCB (radio unused),
; so the generic esp32dev board target fits. Its source tree is src_control/, selected
; with the same out-of-tree filter trick native_sim uses (src_dir is [platformio]-global
; and points at src_cyd). Thin adapters only — logic lives in lib/control_logic.
; Flags common to both controller builds, kept in one place so the bench env can take them
; WITHOUT also inheriting TF_ERROR_QUIET, which is production-only (see below).
[control_common]
build_flags = -Ofast

[env:esp32dev_control]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_src_filter = -<*> +<../src_control/>
; TF_ERROR_QUIET: here — and only here — the link owns UART0, which is where printf lands, so
; TinyFrame's TF_Error would put "[TF] ..." on the wire (lib/tinyframe/TF_Config.h) exactly when
; the link is already unhappy. The bench build's console is a separate UART, so it keeps the
; diagnostics; so do the host tests.
build_flags =
	${control_common.build_flags}
	-D TF_ERROR_QUIET=1
lib_deps = nanopb/Nanopb@^0.4.91
custom_nanopb_protos = +<proto/oven.proto>
extra_scripts = pre:tools/schema_hash_extra_script.py

; ---------- Bench dummy-load controller (backlog A8; design.md §8 step 1) ----------
; The step-1 fail-safe proof on two dev boards, no oven: LEDs + series resistors stand in for
; the heater SSR (GPIO25) and the contactor coil (GPIO26), and pulling the CYD's TX must cut
; them within the 750 ms command-timeout. CONTROL_BENCH moves the link to UART2 (GPIO16/17) and
; hands UART0 back to the USB console — production keeps the link on UART0 per §2/§25, which is
; also the USB bridge's port, so on a devkit you cannot have both boards on USB *and* the link
; up. It also enables the bench-only duty stub and hang trigger. Never flash this at an oven.
[env:esp32dev_control_bench]
extends = env:esp32dev_control
; Deliberately ${control_common.build_flags} and NOT ${env:esp32dev_control.build_flags}: the
; latter carries TF_ERROR_QUIET, and the bench wants TinyFrame's diagnostics — its console is a
; different UART from its link, so TF_Error cannot corrupt anything here.
build_flags =
	${control_common.build_flags}
	-D CONTROL_BENCH=1
; `extends` REPLACES a redeclared key rather than merging it, so the parent's must be
; re-included. Losing extra_scripts here would be the quiet one: schema_hash.h would go stale
; rather than missing, and the two boards would fail the handshake closed with no obvious cause.
extra_scripts = ${env:esp32dev_control.extra_scripts}

; ---------- Native controller-logic tests (pure C++, ports + fakes) ----------
; Controller logic (lib/control_logic) talks only to the lib/control_port interfaces;
; tests inject FakeClock & co. Suites nest under test/test_control/ (one dir = one
; runner binary), all matched by the test_control/* filter.
[env:native_control]
platform = native
build_flags = -std=gnu++17 -D UNIT_TEST
lib_deps = nanopb/Nanopb@^0.4.91
lib_ignore = LovyanGFX lvgl
custom_nanopb_protos = +<proto/oven.proto>
extra_scripts = pre:tools/schema_hash_extra_script.py
test_filter = test_control/*

; ---------- Native logic tests (pure C++, no LovyanGFX/LVGL) ----------
; Runs on the host GCC. LovyanGFX/LVGL are ignored so nothing ESP-IDF/SPI-bound leaks in;
; logic talks only to the IDisplay/ITouch ports (lib/display_port) and tests inject fakes.
[env:native_logic_cyd]
platform = native
build_flags = -std=gnu++17 -D UNIT_TEST
lib_deps =
	fabiobatsilva/ArduinoFake            ; available for future millis()/Serial fakes
	nanopb/Nanopb@^0.4.91
lib_compat_mode = off                    ; allow the Arduino-framework fake on native
lib_ignore = LovyanGFX lvgl
; The §22 fault table maps the controller-owned FaultCode enum to operator wording, so this
; lane needs the generated oven.pb.h just like native_control does. Keying off a hand-copied
; CYD-side enum instead would be exactly the drift §9's matched-pair invariant exists to
; prevent. No schema_hash pre-script: that bakes schema_hash.h, which app_logic never includes.
custom_nanopb_protos = +<proto/oven.proto>
test_filter = test_logic_cyd/*   ; one runner per subdir (see test_control/*)

; ---------- Native LVGL UI-logic tests (headless dummy display) ----------
; LVGL compiled for the host with LV_USE_TEST=1; drives lib/ui_logic via the in-memory
; dummy display + simulated input. No board, no pixels. LovyanGFX stays ignored.
[env:native_ui_cyd]
platform = native
build_flags =
	-std=gnu++17
	-D UNIT_TEST
	-D LV_USE_TEST=1
	-D LV_CONF_PATH='"${platformio.include_dir}/lv_conf.h"'
	${board_2432s028.build_flags}
lib_deps = lvgl/lvgl@^9.5.0
lib_ignore = LovyanGFX
test_filter = test_ui_cyd/*   ; one runner per subdir (see test_control/*)

; ---------- The same UI suites against the 3.5" panel's geometry ----------
; The suites are geometry-independent by construction (they click widget centres from
; lv_obj_get_coords, never fixed points), so running them at a second size is nearly free — and
; it is the only thing that keeps the portrait layouts honest as the UI changes. A separate env
; rather than a flag because PlatformIO gives one env one set of -D's.
[env:native_ui_cyd_35]
extends = env:native_ui_cyd
; Deliberately spelled out rather than ${env:native_ui_cyd.build_flags} + a board section: the
; parent already carries [board_2432s028], so composing would define BOTH boards' PANEL_* and
; leave the geometry to whichever -D the compiler saw last. See the [board_*] header.
build_flags =
	-std=gnu++17
	-D UNIT_TEST
	-D LV_USE_TEST=1
	-D LV_CONF_PATH='"${platformio.include_dir}/lv_conf.h"'
	${board_3248s035.build_flags}

; ---------- Host UI simulator (Claude-assisted UI development) ----------
; Builds lib/ui_logic + LVGL on the host into a headless CLI (sim/) that renders the real
; UI, optionally injects scripted pointer events, and writes a PNG. No display server.
; Run via `make sim-shot` (see the ui-development skill). src_cyd/ is excluded (firmware-only);
; the out-of-tree +<../sim/> filter is the same mechanism LVGL's lv_platformio template uses.
; The simulator, once per geometry. Two envs rather than one parameterized by an environment
; variable, for the same reason the test envs are: a screenshot is evidence, and evidence has to
; say which panel it is of. `make sim-shot SIM_PANEL=35` picks this board's; the default stays the
; 2.8" board; SIM_PANEL=35 renders the default 3.5" one.
[sim_common]
platform = native
build_src_filter = -<*> +<../sim/>
build_flags =
	-std=gnu++17
	-D LV_USE_TEST=1
	-D LV_USE_LODEPNG=1
	; PNG encoding allocates from the host heap (allocators in sim_main.cpp), not LVGL's
	; small builtin pool, which cannot hold zlib's compression state.
	-D LODEPNG_NO_COMPILE_ALLOCATORS
	-D LV_CONF_PATH='"${platformio.include_dir}/lv_conf.h"'
lib_deps = lvgl/lvgl@^9.5.0
lib_ignore = LovyanGFX

[env:native_sim]
extends = sim_common
build_flags = ${sim_common.build_flags} ${board_2432s028.build_flags}

[env:native_sim_35]
extends = sim_common
build_flags = ${sim_common.build_flags} ${board_3248s035.build_flags}

; ---------- Host UI performance harness (perf/perf_main.cpp) ----------
; Times the real lib/ui_logic screens on a display configured exactly like the firmware's, and
; counts the draw tasks LVGL emits. `make perf`. Named perf, NOT bench: esp32dev_cyd*_bench is
; already the two-devkit LINK bench (CYD_BENCH_LINK) and the collision would be genuinely
; confusing.
;
; No -Ofast, unlike [cyd_common]: host codegen says nothing about Xtensa, so these numbers are a
; directional before/after proxy on one machine, and the device probe is the ground truth. The
; TASK COUNTS, though, are exact and portable — those are the numbers that decide strategy.
; No LV_USE_TEST, unlike [sim_common]: the harness builds its own display (the test one renders
; in the wrong mode — see perf_main.cpp) and drives widget state directly rather than through
; lv_test_mouse_*, so none of those helpers are linked.
[perf_common]
platform = native
build_src_filter = -<*> +<../perf/>
build_flags =
	-std=gnu++17
	-D LV_CONF_PATH='"${platformio.include_dir}/lv_conf.h"'
lib_deps = lvgl/lvgl@^9.5.0
lib_ignore = LovyanGFX

[env:native_perf]
extends = perf_common
build_flags = ${perf_common.build_flags} ${board_2432s028.build_flags}

[env:native_perf_35]
extends = perf_common
build_flags = ${perf_common.build_flags} ${board_3248s035.build_flags}

; ---------- On-target hardware tests (real ESP32-2432S028) ----------
; Flashes a Unity runner that asserts gfx.init(), rotated dimensions, brightness, heap
; headroom, and a human-in-the-loop touch target. Use the Micro-USB port.
[env:embedded]
platform = espressif32
board = esp32dev
framework = arduino
test_speed = 115200
build_flags =
	-D LV_CONF_PATH='"${platformio.include_dir}/lv_conf.h"'
	${board_2432s028.build_flags}
lib_deps =
	lovyan03/LovyanGFX@^1.2.0
	lvgl/lvgl@^9.5.0
test_filter = test_embedded_hw
